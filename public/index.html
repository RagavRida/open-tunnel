<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Open Tunnel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
    }
    #header {
      padding: 8px 16px;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #header h1 { font-size: 14px; font-weight: 600; color: #e94560; }
    #status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #333;
    }
    #status.connected { background: #064e3b; color: #6ee7b7; }
    #status.disconnected { background: #7f1d1d; color: #fca5a5; }
    #status.connecting { background: #78350f; color: #fcd34d; }
    #terminal-container {
      flex: 1;
      padding: 4px;
      overflow: hidden;
    }
    #connect-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    #connect-screen h2 { font-size: 20px; margin-bottom: 16px; color: #e94560; }
    #connect-screen p { font-size: 14px; color: #9ca3af; margin-bottom: 20px; }
    #token-input {
      width: 100%;
      max-width: 360px;
      padding: 12px 16px;
      font-size: 16px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      text-align: center;
      font-family: monospace;
      letter-spacing: 2px;
    }
    #token-input:focus { outline: none; border-color: #e94560; }
    #connect-btn {
      margin-top: 16px;
      padding: 12px 32px;
      font-size: 16px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    #connect-btn:active { background: #c73650; }
    #error-msg { color: #fca5a5; margin-top: 12px; font-size: 13px; display: none; }
    .xterm { height: 100%; }
    #input-bar {
      display: none;
      flex-shrink: 0;
      padding: 6px 8px;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }
    #input-bar .row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #cmd-input {
      flex: 1;
      padding: 10px 12px;
      font-size: 16px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: Menlo, Monaco, monospace;
      outline: none;
    }
    #cmd-input:focus { border-color: #e94560; }
    #send-btn {
      padding: 10px 16px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    #send-btn:active { background: #c73650; }
    .shortcut-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      overflow-x: auto;
    }
    .shortcut-btn {
      padding: 6px 10px;
      background: #0f3460;
      color: #e0e0e0;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
      white-space: nowrap;
    }
    .shortcut-btn:active { background: #e94560; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Open Tunnel</h1>
    <span id="status" class="disconnected">Disconnected</span>
  </div>

  <div id="connect-screen">
    <h2>Remote Terminal</h2>
    <p>Enter the session token from your terminal</p>
    <input id="token-input" type="text" placeholder="Paste token here" autocomplete="off" spellcheck="false">
    <button id="connect-btn" onclick="connect()">Connect</button>
    <p id="error-msg"></p>
  </div>

  <div id="terminal-container" style="display:none"></div>

  <div id="input-bar">
    <div class="row">
      <input id="cmd-input" type="text" placeholder="Type command..."
        autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="send-btn" onclick="sendCommand()">Run</button>
    </div>
    <div class="shortcut-row">
      <button class="shortcut-btn" onclick="sendKey('\t')">Tab</button>
      <button class="shortcut-btn" onclick="sendKey('\x03')">Ctrl+C</button>
      <button class="shortcut-btn" onclick="sendKey('\x04')">Ctrl+D</button>
      <button class="shortcut-btn" onclick="sendKey('\x1b[A')">Up</button>
      <button class="shortcut-btn" onclick="sendKey('\x1b[B')">Down</button>
      <button class="shortcut-btn" onclick="sendKey('\x1b')">Esc</button>
      <button class="shortcut-btn" onclick="sendKey('\x0c')">Clear</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    let ws, term, fitAddon;
    let currentToken = '';
    let termInitialized = false;
    let reconnectTimer = null;

    const urlToken = new URLSearchParams(window.location.search).get('token');
    if (urlToken) {
      document.getElementById('token-input').value = urlToken;
      window.addEventListener('load', () => setTimeout(connect, 300));
    }

    function setStatus(state, text) {
      const el = document.getElementById('status');
      el.className = state;
      el.textContent = text || state.charAt(0).toUpperCase() + state.slice(1);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function sendKey(key) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'input', data: key }));
      }
    }

    function sendCommand() {
      const input = document.getElementById('cmd-input');
      const cmd = input.value;
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'input', data: cmd + '\r' }));
      }
      input.value = '';
      input.focus();
    }

    document.getElementById('cmd-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendCommand();
      }
    });

    function initTerminal() {
      if (termInitialized) return;
      termInitialized = true;

      document.getElementById('connect-screen').style.display = 'none';
      document.getElementById('terminal-container').style.display = 'block';
      document.getElementById('input-bar').style.display = 'block';

      term = new Terminal({
        cursorBlink: true,
        fontSize: 12,
        fontFamily: 'Menlo, Monaco, "Courier New", monospace',
        theme: {
          background: '#1a1a2e',
          foreground: '#e0e0e0',
          cursor: '#e94560',
          selectionBackground: '#0f3460',
        },
        scrollback: 1000,
      });

      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      term.onData((data) => {
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'input', data }));
        }
      });

      const handleResize = () => {
        if (fitAddon && term) {
          fitAddon.fit();
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
          }
        }
      };
      window.addEventListener('resize', handleResize);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', handleResize);
      }
    }

    function reconnect() {
      if (reconnectTimer) return;
      setStatus('connecting', 'Reconnecting...');
      if (term) term.write('\r\n\x1b[33m--- Reconnecting... ---\x1b[0m\r\n');
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connectWs();
      }, 2000);
    }

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${proto}//${location.host}?type=client&token=${currentToken}`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        setStatus('connected', 'Connected');
        if (term) {
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        }
        setTimeout(() => document.getElementById('cmd-input').focus(), 300);
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'output' && term) {
            term.write(msg.data);
          }
        } catch (e) {
          if (term) term.write(event.data);
        }
      };

      ws.onclose = (event) => {
        if (event.code === 4001) {
          // Agent not running — don't reconnect
          setStatus('disconnected', 'Disconnected');
          if (term) term.write('\r\n\x1b[31m--- No agent found. Is it running? ---\x1b[0m\r\n');
        } else if (event.code === 4002) {
          // Agent disconnected
          setStatus('disconnected', 'Disconnected');
          if (term) term.write('\r\n\x1b[31m--- Agent disconnected ---\x1b[0m\r\n');
          // Agent might reconnect, so we should too
          reconnect();
        } else {
          // Unexpected close — auto-reconnect
          reconnect();
        }
      };

      ws.onerror = () => {
        // Will trigger onclose, which handles reconnect
      };
    }

    function connect() {
      const token = document.getElementById('token-input').value.trim();
      if (!token) { showError('Please enter a token'); return; }

      currentToken = token;
      document.getElementById('error-msg').style.display = 'none';
      setStatus('connecting', 'Connecting...');

      initTerminal();
      connectWs();
    }
  </script>
</body>
</html>
